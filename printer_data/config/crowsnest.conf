[cam nozzle]

mode: ustreamer
device: /dev/v4l/by-id/usb-WeiaoChip_Industrial_Camera_UAPD3134B781000-video-index0
resolution: 640x480
port: 8081
max_fps: 5

custom_flags:
  --format=YUYV
  --resolution=640x480
  --desired-fps=5
  --buffers=8
  --encoder=cpu
  --quality=95
  --persistent
  --drop-same-frames=5
