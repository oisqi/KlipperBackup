mode: camera-streamer
device: /base/soc/i2c0mux/i2c@1/ov5647@36
resolution: 1296x972
max_fps: 46
port: 8080

custom_flags:
  --camera-format=MJPEG
  --framerate=46
  --width=1296
  --height=972
  --sharpness=1.5
  --contrast=1.1
  --saturation=1.1
  --denoise=high
  --awb=auto
  --ae=normal
  --timeout=0