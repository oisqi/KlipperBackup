[stepper_y]
step_pin: PF6
dir_pin: !PF7
enable_pin: !PF2
microsteps: 16
rotation_distance: 40
endstop_pin: ^!PL7
position_endstop: 0
position_max: 300
homing_speed: 30

[tmc2209 stepper_y]
uart_pin: PJ1
run_current: 0.80
hold_current: 0.50
stealthchop_threshold: 999999
uart_address: 3

[stepper_x]
step_pin = PF0
dir_pin = !PF1
enable_pin = !PD7
microsteps = 16
rotation_distance = 40
endstop_pin = ^!PE5
position_endstop = 0
position_min = -1
position_max = 225
homing_speed = 30.0

[tmc2209 stepper_x]
uart_pin: PJ1
run_current: 0.80
hold_current: 0.50
stealthchop_threshold: 999999
uart_address: 2